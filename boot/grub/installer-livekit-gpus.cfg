if [ "x$grub_cpu" = "xx86_64" -o "x$grub_cpu" = "xi386" -o "x$grub_cpu" = "xarm64" ] ; then
	menuentry $"Install AOSC OS (NVIDIA)" --class aosc --class gnu-linux --class live --id aosc_live_desktop_nvidia_open --unrestricted {
		insmod gzio
		linux /boot/kernel SYSTEMD_SULOGIN_FORCE=1 root=aosc-livekit:CDLABEL=$volid quiet splash livekit.boot=livekit-nvidia-open modprobe.blacklist=nouveau $kernel_lang_param nvidia_drm.fbdev=1 nvidia_drm.modeset=1
		initrd /boot/live-initramfs-nvidia-open.img
	}
	menuentry $"Install AOSC OS (NVIDIA GPUs older than GeForce GTX 16 series)" --class aosc --class gnu-linux --class live --id aosc_live_desktop_nvidia --unrestricted {
		insmod gzio
		linux /boot/kernel SYSTEMD_SULOGIN_FORCE=1 root=aosc-livekit:CDLABEL=$volid quiet splash livekit.boot=livekit-nvidia modprobe.blacklist=nouveau $kernel_lang_param nvidia_drm.fbdev=1 nvidia_drm.modeset=1
		initrd /boot/live-initramfs-nvidia.img
	}
fi
if [ "x$grub_cpu" = "xx86_64" -o "x$grub_cpu" = "xi386" -o "x$grub_cpu" = "xarm64" -o "x$grub_cpu" = "xloongarch64" ] ; then
	menuentry $"Install AOSC OS (Glenfly Arise 1000/2000 series GPUs)" --class aosc --class gnu-linux --class live --id aosc_live_desktop_arise --unrestricted {
		insmod gzio
		linux /boot/kernel SYSTEMD_SULOGIN_FORCE=1 root=aosc-livekit:CDLABEL=$volid quiet splash livekit.boot=livekit-arise $kernel_lang_param
		initrd /boot/live-initramfs-arise.img
	}
fi
